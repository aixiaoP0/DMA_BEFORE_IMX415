app.name = sserver-sclient-udp-adaptive
runtime.shutdown_grace_period_ms = 100
runtime.latency_log_interval_frames = 60

capture.enabled = true
capture.source = v4l2
capture.device = /dev/video0
capture.width = 640
capture.height = 480
capture.fps = 30
capture.frame_interval_ms = 0
capture.device_buffer_count = 2

transport.enabled = true
transport.backend = udp
transport.bind_address = 127.0.0.1
transport.listen_port = 19101
transport.max_pending_frames = 2
transport.accept_loop_interval_ms = 1
transport.enable_nodelay = true
transport.embed_frame_metadata = true
transport.udp_client_timeout_ms = 10000
transport.udp_max_datagram_size = 65507
transport.udp_target_payload_size = 1000
transport.udp_receive_buffer_bytes = 4194304
transport.udp_send_buffer_bytes = 4194304
transport.udp_enable_nack = true
transport.udp_enable_fec = true

codec.backend = x264
codec.x264_preset = ultrafast
codec.x264_tune = zerolatency
codec.x264_profile = baseline
codec.x264_annexb = true
codec.x264_repeat_headers = true
codec.x264_keyint_max = 10
codec.x264_keyint_min = 10
codec.x264_bframes = 0
codec.x264_threads = 1
codec.x264_sliced_threads = true
codec.x264_slice_count = 1
codec.x264_slice_count_max = 1
codec.x264_frame_reference = 1
codec.x264_lookahead = 0
codec.x264_sync_lookahead = 0
codec.x264_subpel_refine = 0
codec.x264_mb_tree = false
codec.x264_scenecut = 0
